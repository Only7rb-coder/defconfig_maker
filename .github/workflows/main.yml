name: Extract Defconfig

on:
  workflow_dispatch:
    inputs:
      boot_url:
        description: 'Direct Link to boot.img'
        required: true

jobs:
  extract_config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full wget python3 file

      - name: Download Boot Image
        run: |
          # Using -L to follow redirects and --user-agent to mimic a browser
          wget -qL --user-agent="Mozilla/5.0" "${{ github.event.inputs.boot_url }}" -O boot.img
          
          # VALIDATION: Check if the file is actually an image
          FILE_TYPE=$(file -b boot.img)
          echo "Downloaded file type: $FILE_TYPE"
          
          if [[ "$FILE_TYPE" == *"HTML"* ]]; then
            echo "ERROR: The link provided is a webpage, not a direct file download."
            echo "Please use a direct link (e.g., Gofile direct link or GDrive export link)."
            exit 1
          fi

      - name: Setup Latest Magiskboot
        run: |
          wget -q https://github.com/topjohnwu/Magisk/releases/download/v27.0/Magisk-v27.0.apk
          unzip -q Magisk-v27.0.apk "lib/x86_64/libmagiskboot.so"
          mv lib/x86_64/libmagiskboot.so magiskboot
          chmod +x magiskboot
          rm Magisk-v27.0.apk

      - name: Unpack Boot Image
        run: |
          ./magiskboot unpack boot.img || { echo "Failed to unpack image. It might be corrupt or an unsupported format."; exit 1; }
          if [ ! -f "kernel" ]; then
            echo "Error: No kernel blob found in boot.img."
            exit 1
          fi

      - name: Extract Kernel Config
        run: |
          wget -q https://raw.githubusercontent.com/torvalds/linux/master/scripts/extract-ikconfig
          chmod +x extract-ikconfig
          
          # Attempt extraction
          ./extract-ikconfig kernel > extracted_defconfig 2>/dev/null || true
          
          if [ -s "extracted_defconfig" ]; then
            echo "Success: Config extracted."
          else
            echo "FAILED: IKCONFIG is not enabled in this kernel."
            exit 1
          fi

      - name: Upload Defconfig
        uses: actions/upload-artifact@v4
        with:
          name: kernel_defconfig
          path: extracted_defconfig
