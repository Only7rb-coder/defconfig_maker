name: Extract Defconfig

on:
  workflow_dispatch:
    inputs:
      bootimg_link:
        description: 'Direct Link to boot.img'
        required: true
        type: string

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq lz4 lzop bzip2 xz-utils zstd file wget curl

      - name: Fetch Tools
        run: |
          # Kernel extraction script
          wget https://raw.githubusercontent.com/torvalds/linux/master/scripts/extract-ikconfig -O extract-ikconfig
          chmod +x extract-ikconfig
          
          # Stable Magiskboot (Using a reliable static binary host)
          curl -L https://github.com/Pofofoo/magiskboot-binaries/raw/main/x86_64/magiskboot -o magiskboot
          
          # Verify magiskboot was actually downloaded
          if [ ! -s magiskboot ]; then
            echo "Failed to download magiskboot, trying secondary mirror..."
            curl -L https://github.com/Rem01Gaming/magiskboot-binaries/raw/main/magiskboot -o magiskboot
          fi
          chmod +x magiskboot

      - name: Download boot.img
        run: |
          echo "Downloading file..."
          # Disguise as a browser to avoid Gofile's block
          curl -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
               -o boot.img "${{ github.event.inputs.bootimg_link }}"
          
          FILE_INFO=$(file boot.img)
          echo "Status: $FILE_INFO"
          
          if [[ "$FILE_INFO" == *"HTML"* ]]; then
            echo "❌ ERROR: Still getting HTML document from Gofile."
            exit 1
          fi

      - name: Extract Config
        run: |
          # Try to unpack the boot image
          ./magiskboot unpack boot.img || echo "Magiskboot couldn't unpack, might be a raw kernel."
          
          # Target selection
          if [ -f "kernel" ]; then
            SCAN_TARGET="kernel"
          else
            SCAN_TARGET="boot.img"
          fi
          
          echo "Attempting extraction on $SCAN_TARGET..."
          ./extract-ikconfig "$SCAN_TARGET" > defconfig_extracted.txt
          
          if [ ! -s defconfig_extracted.txt ]; then
            echo "❌ ERROR: No ikconfig found in this kernel."
            exit 1
          fi
          echo "✅ Extraction successful."

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: extracted-defconfig
          path: defconfig_extracted.txt
