name: Extract Defconfig

on:
  workflow_dispatch:
    inputs:
      bootimg_link:
        description: 'Gofile Link'
        required: true
        type: string

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq lz4 lzop bzip2 xz-utils zstd file
          # Get extraction scripts
          wget https://raw.githubusercontent.com/torvalds/linux/master/scripts/extract-ikconfig
          chmod +x extract-ikconfig
          wget https://github.com/svidersky/magiskboot-binaries/raw/main/x86_64/magiskboot -O magiskboot
          chmod +x magiskboot

      - name: Smart Download
        run: |
          echo "Downloading with Browser Spoofing..."
          # We use a real browser User-Agent to stop Gofile from redirecting us to an HTML page
          curl -L -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
               -o boot.img "${{ github.event.inputs.bootimg_link }}"
          
          FILE_TYPE=$(file boot.img)
          echo "Downloaded file type: $FILE_TYPE"
          
          if [[ "$FILE_TYPE" == *"HTML"* ]]; then
            echo "❌ ERROR: Still getting HTML. Gofile is blocking the script."
            echo "FIX: Upload your boot.img to a GitHub Release or Discord and use that link instead."
            exit 1
          fi

      - name: Process and Extract
        run: |
          # Try to unpack if it's an Android boot image
          ./magiskboot unpack boot.img || echo "Not a standard Android boot image, scanning raw..."
          
          TARGET="boot.img"
          [ -f "kernel" ] && TARGET="kernel"
          
          ./extract-ikconfig "$TARGET" > defconfig_extracted.txt
          
          if [ ! -s defconfig_extracted.txt ]; then
            echo "❌ ERROR: Config not found in kernel."
            exit 1
          fi

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: extracted_defconfig
          path: defconfig_extracted.txt
